name: Build and Deploy to Azure App Service

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'reazlab-api'
  AZURE_WEBAPP_PACKAGE_PATH: './Beamo.Api/bin/Release'
  DOTNET_VERSION: '10.0'
  DOTNET_CONFIGURATION: 'Release'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration ${{ env.DOTNET_CONFIGURATION }} --no-restore

    - name: Publish
      run: dotnet publish ./Beamo.Api/Beamo.Api.csproj --configuration ${{ env.DOTNET_CONFIGURATION }} --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

    - name: Deploy to Azure
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
