# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and Deploy Beamo API to Azure Web App - reazlab-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore API dependencies
        run: dotnet restore Beamo.Api/Beamo.Api.csproj

      - name: Build API
        run: dotnet build Beamo.Api/Beamo.Api.csproj --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish Beamo.Api/Beamo.Api.csproj -c Release -o ./published

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: beamo-api
          path: ./published

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: beamo-api
          path: ./published

      - name: Deploy to Azure Web App (Linux)
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'reazlab-api'
          slot-name: 'production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: ./published
